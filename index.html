<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base target="_top">
  <title>Kosame - Price List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kosame: {
              bg: '#fffcf5',
              blue: '#cceaff',
              bluedark: '#8cc6ff',
              brown: '#c68a69',
              browndark: '#9c6242',
              yellow: '#ffdf73',
              pink: '#ffd1dc',
              cream: '#fdf4e1'
            }
          },
          fontFamily: {
            sans: ['Mali', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { 
      background-color: #fffcf5; 
      font-family: 'Mali', cursive, sans-serif; 
      color: #c68a69; 
      overflow-x: hidden; 
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* สไตล์สกอร์บาร์ขนาดเล็กสำหรับหมวดหมู่ */
    .cat-scrollbar::-webkit-scrollbar { height: 4px; }
    .cat-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .cat-scrollbar::-webkit-scrollbar-thumb { background: #cceaff; border-radius: 10px; }
    
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-in { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }

    .striped-header-footer {
      background-image: linear-gradient(-45deg, #cceaff 25%, #e5f4ff 25%, #e5f4ff 50%, #cceaff 50%, #cceaff 75%, #e5f4ff 75%, #e5f4ff 100%);
      background-size: 40px 40px;
      animation: moveStripes 2s linear infinite;
      border-bottom: 4px solid #fdf4e1;
    }
    @keyframes moveStripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    @keyframes twinkleStar {
      0%, 100% { opacity: 0.2; transform: scale(0.6); }
      50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 4px rgba(255, 223, 115, 0.8)); }
    }
    .star { position: absolute; pointer-events: none; animation: twinkleStar linear infinite; z-index: 0; }

    .kosame-card {
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border: 2px solid #cceaff;
      border-radius: 1.5rem;
      box-shadow: 0 4px 0 0 #cceaff;
      transition: all 0.3s;
    }
  </style>
</head>
<body class="selection:bg-kosame-yellow/50 selection:text-kosame-browndark">
  
  <div id="root" class="relative z-10 w-full flex justify-center"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzhWNs5PgmBtsECkbbOMUdolXZvRx7zUz-hwPag0oHRH64MuECpEguBVpcJCrGk0xLILA/exec"; 
    const ADMIN_PASSWORD = "0615"; 

    const server = {
      request: async (action, payload = null) => {
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: action, payload: payload })
          });
          const data = await response.json();
          if (data.error) throw new Error(data.error);
          return data;
        } catch (error) {
          console.error("API Request Error:", error);
          throw error;
        }
      },
      getAllData: () => server.request('getAllData'),
      addPriceItem: (item) => server.request('addPriceItem', item),
      deletePriceItem: (id) => server.request('deletePriceItem', id)
    };

    const Icon = ({ name, size = 18, className = "" }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current && window.lucide) {
          spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
          window.lucide.createIcons({
            attrs: { width: size, height: size },
            root: spanRef.current
          });
        }
      }, [name, size, className]);
      return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
    };

    const SkyBackground = () => {
      const stars = Array.from({ length: 25 }).map((_, i) => (
        <div key={i} className="star" style={{ left: `${Math.random() * 100}vw`, top: `${Math.random() * 100}vh`, animationDuration: `${3 + Math.random() * 4}s`, animationDelay: `${Math.random() * 5}s` }}>
          <svg width={12 + Math.random() * 18} height={12 + Math.random() * 18} viewBox="0 0 24 24" fill={['#ffdf73', '#ffd1dc', '#ffffff'][i % 3]}><path d="M12 2L14.64 9.36L22 12L14.64 14.64L12 22L9.36 14.64L2 12L9.36 9.36L12 2Z" /></svg>
        </div>
      ));
      return <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">{stars}</div>;
    };

    const CategoryTabs = ({ categories, activeTab, onTabClick, isAdmin, onAddCat, onDeleteCat }) => (
      <div className="flex gap-2 py-4 overflow-x-auto cat-scrollbar scroll-smooth items-center w-full px-1 pb-4">
        {categories.map((tab) => (
          <div key={tab} className="relative group flex-shrink-0">
            <button onClick={() => onTabClick(tab)} className={`relative px-5 py-2 transition-all duration-300 flex items-center justify-center rounded-full font-bold text-sm shadow-sm border-2 ${activeTab === tab ? 'bg-kosame-yellow border-white text-white' : 'bg-white/80 border-kosame-cream text-kosame-brown hover:border-kosame-blue hover:text-kosame-blue'}`}>
              <span className="uppercase tracking-wider whitespace-nowrap">{tab}</span>
            </button>
            {isAdmin && activeTab === tab && (
                <button onClick={(e) => { e.stopPropagation(); onDeleteCat(tab); }} className="absolute -top-1 -right-1 w-5 h-5 bg-red-100 border border-red-300 text-red-500 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white z-10 shadow-sm">
                    <Icon name="x" size={12} />
                </button>
            )}
          </div>
        ))}
        {isAdmin && (
            <button onClick={onAddCat} className="mb-2 ml-1 w-9 h-9 rounded-full bg-kosame-cream border-2 border-dashed border-kosame-blue text-kosame-blue hover:bg-kosame-blue hover:text-white hover:border-white flex items-center justify-center transition-all flex-shrink-0 shadow-sm">
                <Icon name="plus" size={18} />
            </button>
        )}
      </div>
    );

    const LoginModal = ({ onClose, onLogin }) => {
        const [pwd, setPwd] = useState("");
        const [checking, setChecking] = useState(false);
        const handleSubmit = (e) => {
            e.preventDefault();
            setChecking(true);
            setTimeout(() => {
                setChecking(false);
                if (pwd === ADMIN_PASSWORD) onLogin(); else alert("รหัสผ่านไม่ถูกต้อง!");
            }, 600);
        };
        return (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-kosame-bg/80 backdrop-blur-sm animate-fade-in">
                <div className="bg-white w-full max-w-xs p-8 kosame-card relative text-center">
                    <button onClick={onClose} className="absolute top-4 right-4 text-kosame-brown hover:text-kosame-browndark bg-kosame-cream rounded-full p-1"><Icon name="x" size={20} /></button>
                    <div className="flex flex-col items-center gap-3 mb-6">
                        <div className="w-16 h-16 bg-kosame-yellow rounded-full flex items-center justify-center text-white mb-2"><Icon name="key" size={32} /></div>
                        <h2 className="text-xl font-extrabold text-kosame-browndark">Admin Login</h2>
                        <p className="text-xs text-kosame-brown">กรุณาใส่รหัสผ่านเพื่อแก้ไขราคา</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input type="password" placeholder="รหัสผ่าน" className="w-full bg-kosame-bg border-2 border-kosame-cream rounded-xl py-3 text-center text-kosame-browndark tracking-[0.2em] focus:border-kosame-blue focus:outline-none" value={pwd} onChange={(e) => setPwd(e.target.value)} autoFocus />
                        <button type="submit" disabled={checking} className="w-full bg-kosame-blue hover:bg-kosame-bluedark text-white font-bold py-3 rounded-xl transition-all text-sm shadow-sm disabled:opacity-50 flex justify-center items-center gap-2">
                          {checking ? <><Icon name="loader" className="animate-spin" size={16}/> ตรวจสอบ...</> : "เข้าสู่ระบบ"}
                        </button>
                    </form>
                </div>
            </div>
        );
    };

    const PriceView = ({ data, setData, isAdmin, categories }) => {
        const [activeTab, setActiveTab] = useState(categories[0] || 'General');
        const [showAddForm, setShowAddForm] = useState(false);
        const [loading, setLoading] = useState(false);
        const [editingId, setEditingId] = useState(null); 
        
        const [formType, setFormType] = useState('');
        const [formImg, setFormImg] = useState('');
        const [formCat, setFormCat] = useState('');
        const [formAdditional, setFormAdditional] = useState('');
        const [isNewCat, setIsNewCat] = useState(false);
        const [priceOptions, setPriceOptions] = useState([{ count: '1 ตัว', price: '' }]);

        useEffect(() => {
            if(categories.length > 0 && !categories.includes(activeTab)) setActiveTab(categories[0]);
        }, [categories]);

        const currentData = data.filter(p => p.Category === activeTab);
        
        const handleAddOption = () => setPriceOptions([...priceOptions, { count: '', price: '' }]);
        
        const handleOptionChange = (idx, field, val) => {
            const newOpts = [...priceOptions];
            newOpts[idx][field] = val;
            setPriceOptions(newOpts);
        };
        
        const handleRemoveOption = (idx) => {
            if (priceOptions.length > 1) {
                setPriceOptions(priceOptions.filter((_, i) => i !== idx));
            } else {
                setPriceOptions([{ count: '', price: '' }]);
            }
        };

        const openAddModal = () => {
            setIsNewCat(false);
            setEditingId(null);
            setFormType(''); setFormImg(''); setPriceOptions([{ count: '1 ตัว', price: '' }]); setFormAdditional('');
            setShowAddForm(true);
        };

        const openEditModal = (item) => {
            setEditingId(item.ID);
            setFormType(item.Type);
            setFormImg(item.ImageURL || '');
            setFormAdditional(item.Additional || '');
            try {
                const parsedOpts = JSON.parse(item.Options);
                setPriceOptions(parsedOpts.length > 0 ? parsedOpts : [{ count: '1 ตัว', price: '' }]);
            } catch(e) {
                setPriceOptions([{ count: '1 ตัว', price: '' }]);
            }
            setIsNewCat(false);
            setShowAddForm(true);
        };

        const handleSubmit = async () => {
            if (!formType) return alert("กรุณาใส่ชื่อบริการ");
            const finalCat = isNewCat ? formCat : activeTab;
            setLoading(true);
            try {
                if (editingId) await server.deletePriceItem(editingId);
                const newItem = { id: editingId || Date.now().toString(), category: finalCat, type: formType, image: formImg, options: priceOptions, additional: formAdditional };
                const newData = await server.addPriceItem(newItem);
                setData(newData.prices); 
                setShowAddForm(false);
                setEditingId(null);
                setActiveTab(finalCat); 
            } catch(e) {
                alert("บันทึกข้อมูลไม่สำเร็จ");
            } finally {
                setLoading(false);
            }
        };

        const handleDelete = async (id) => {
            if(!confirm("ต้องการลบการ์ดนี้ใช่หรือไม่?")) return;
            setLoading(true);
            try {
                const d = await server.deletePriceItem(id);
                setData(d.prices); 
                if(editingId) setShowAddForm(false);
            } catch(e) {
                alert("ลบข้อมูลไม่สำเร็จ");
            } finally {
                setLoading(false);
            }
        };

        const handleDeleteCategory = async (cat) => {
            if(!confirm(`ต้องการลบหมวดหมู่ '${cat}' ใช่หรือไม่?`)) return;
            const itemsToDelete = data.filter(item => item.Category === cat);
            setLoading(true);
            try {
                let updatedData = data;
                for (const item of itemsToDelete) {
                    const res = await server.deletePriceItem(item.ID);
                    updatedData = res.prices;
                }
                setData(updatedData);
                if(activeTab === cat) setActiveTab(categories[0] || 'General');
            } catch(e) {
                alert("ลบหมวดหมู่ไม่สำเร็จ");
            } finally {
                setLoading(false);
            }
        };

        return (
            <div className="flex flex-col gap-4 animate-in pb-32">
                <header className="mb-2 mt-4 flex flex-col items-center text-center">
                    <div className="w-24 h-24 bg-white rounded-full border-4 border-kosame-blue overflow-hidden shadow-md mb-3">
                        <img src="https://i.pinimg.com/736x/21/df/b6/21dfb607ea0ba0df850f83dd71752b02.jpg" className="w-full h-full object-cover" alt="Kosame" />
                    </div>
                    <h1 className="text-3xl font-bold text-kosame-browndark tracking-wide">Kosame</h1>
                    <div className="mt-1 bg-kosame-cream px-4 py-1 rounded-full text-xs font-bold text-kosame-brown border border-white shadow-sm inline-flex items-center gap-1">
                        PRICE LIST ✧.*
                    </div>
                </header>

                <CategoryTabs categories={categories} activeTab={activeTab} onTabClick={setActiveTab} isAdmin={isAdmin} onAddCat={() => { setIsNewCat(true); setFormCat(""); setShowAddForm(true); }} onDeleteCat={handleDeleteCategory} />
                
                {isAdmin && (
                    <button onClick={openAddModal} className="w-full py-3 bg-white/60 border-2 border-dashed border-kosame-blue rounded-xl text-kosame-blue font-bold hover:bg-kosame-blue hover:text-white transition-colors flex items-center justify-center gap-2 shadow-sm">
                        <Icon name="plus-circle" size={18} /> เพิ่มรายการในหมวดหมู่นี้
                    </button>
                )}
                
                <div className="mt-2 space-y-4">
                    {currentData.map((item, idx) => {
                        let options = [];
                        try { options = JSON.parse(item.Options); } catch(e) { options = []; }
                        return (
                            <div key={idx} onClick={() => isAdmin && openEditModal(item)} className={`kosame-card bg-white overflow-hidden group ${isAdmin ? 'cursor-pointer hover:border-kosame-blue hover:shadow-md' : ''}`}>
                                <div className="bg-kosame-cream py-3 px-4 flex items-center justify-between border-b border-kosame-blue/20">
                                    <div className="flex items-center gap-2">
                                        {/* ไอคอนป้ายแท็ก ปรับให้เป็นกรอบ 1:1 w-7 h-7 */}
                                        <div className="bg-kosame-yellow w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-lg text-white">
                                            <Icon name="tag" size={16}/>
                                        </div>
                                        <span className="text-sm font-bold text-kosame-browndark uppercase">{item.Type}</span>
                                    </div>
                                </div>
                                <div className="p-4 flex gap-4 items-start bg-white/80">
                                    <div className="flex-shrink-0 w-24 h-24 bg-kosame-bg border-2 border-kosame-cream rounded-xl flex items-center justify-center overflow-hidden">
                                        {item.ImageURL ? <img src={item.ImageURL} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"/> : <Icon name="image" size={32} className="text-kosame-blue/50" />}
                                    </div>
                                    <div className="flex-grow">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="text-[10px] text-kosame-brown border-b border-kosame-cream uppercase tracking-wider font-bold">
                                                    <th className="pb-1.5 text-left">จำนวน</th>
                                                    <th className="pb-1.5 text-right">ราคา (บาท)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-kosame-browndark font-bold text-sm">
                                                {options.map((row, rIdx) => (
                                                    <tr key={rIdx} className="border-b border-kosame-cream/50 last:border-0 hover:bg-kosame-bg/50 transition-colors">
                                                        <td className="py-2">{row.count}</td>
                                                        <td className="py-2 text-right text-kosame-blue">{row.price}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        {item.Additional && (
                                            <div className="mt-3 pt-2 border-t border-kosame-cream text-[10px] text-kosame-brown flex items-start gap-1 bg-kosame-yellow/10 p-2 rounded-lg border-l-2 border-l-kosame-yellow">
                                                <Icon name="info" size={12} className="text-kosame-yellow flex-shrink-0 mt-0.5" />
                                                <span><span className="font-bold text-kosame-browndark">หมายเหตุ:</span> {item.Additional}</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>

                {showAddForm && (
                    <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-kosame-bg/80 backdrop-blur-sm animate-in">
                        <div className="bg-white border-2 border-kosame-blue p-6 w-full max-w-sm max-h-[90vh] overflow-y-auto rounded-3xl shadow-xl relative">
                            <button onClick={() => setShowAddForm(false)} className="absolute top-4 right-4 text-kosame-brown hover:text-white hover:bg-kosame-yellow bg-kosame-cream p-2 rounded-full transition-colors z-10 shadow-sm"><Icon name="x" size={18}/></button>

                            <div className="mb-4 border-b-2 border-kosame-cream pb-3 pr-10">
                                <h3 className="text-lg font-bold text-kosame-browndark flex items-center gap-2">
                                    {/* ไอคอนดินสอ/ฐานข้อมูล ปรับให้เป็นกรอบ 1:1 w-7 h-7 */}
                                    <div className="bg-kosame-blue w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-lg text-white">
                                        <Icon name={editingId ? "pencil" : "database"} size={16}/>
                                    </div> 
                                    {editingId ? 'แก้ไขข้อมูลบริการ' : 'เพิ่มรายการใหม่'}
                                </h3>
                            </div>
                            
                            <div className="mb-4">
                                {isNewCat ? (
                                    <input type="text" placeholder="ชื่อหมวดหมู่ใหม่" className="w-full bg-kosame-bg border-2 border-kosame-cream p-3 rounded-xl text-sm text-kosame-browndark focus:border-kosame-blue outline-none uppercase" value={formCat} onChange={e => setFormCat(e.target.value)} autoFocus />
                                ) : (
                                    <button className="w-full py-2 bg-kosame-cream rounded-xl text-kosame-browndark text-xs font-bold">หมวดหมู่: {activeTab.toUpperCase()}</button>
                                )}
                            </div>
                            
                            <label className="text-xs text-kosame-browndark font-bold mb-1 block">ชื่อบริการ</label>
                            <input type="text" placeholder="เช่น Emote" className="w-full bg-kosame-bg border-2 border-kosame-cream p-3 mb-4 rounded-xl text-sm text-kosame-browndark focus:border-kosame-blue outline-none" value={formType} onChange={e => setFormType(e.target.value)} />
                            
                            <div className="space-y-2 mb-4 bg-kosame-bg p-3 rounded-xl border-2 border-kosame-cream">
                                <label className="text-xs text-kosame-browndark font-bold flex items-center gap-1"><Icon name="list" size={14}/> ตั้งราคา</label>
                                
                                {priceOptions.map((opt, idx) => (
                                    <div key={idx} className="flex gap-2 items-center">
                                        <input type="text" placeholder="จำนวน" className="w-1/3 bg-white border-2 border-kosame-cream p-2 rounded-lg text-sm text-kosame-browndark outline-none focus:border-kosame-blue" value={opt.count} onChange={e => handleOptionChange(idx, 'count', e.target.value)} />
                                        
                                        <div className="relative flex-1">
                                            <input type="text" placeholder="ราคา" className="w-full bg-white border-2 border-kosame-cream p-2 pr-8 rounded-lg text-sm text-kosame-browndark outline-none focus:border-kosame-blue" value={opt.price} onChange={e => handleOptionChange(idx, 'price', e.target.value)} />
                                            
                                            <button 
                                                onClick={() => handleRemoveOption(idx)} 
                                                className="absolute right-2 top-1/2 -translate-y-1/2 text-red-300 hover:text-red-500 transition-colors p-1"
                                                title="ลบแถวนี้"
                                            >
                                                <Icon name="trash-2" size={16}/>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={handleAddOption} className="text-xs font-bold text-kosame-blue hover:text-white hover:bg-kosame-blue border border-kosame-blue py-1.5 px-3 rounded-lg transition-colors mt-2 w-full">+ เพิ่มแถวราคา</button>
                            </div>
                            
                            <label className="text-xs text-kosame-browndark font-bold mb-1 block">URL รูปภาพ</label>
                            <input type="text" className="w-full bg-kosame-bg border-2 border-kosame-cream p-3 mb-4 rounded-xl text-sm text-kosame-browndark focus:border-kosame-blue outline-none" value={formImg} onChange={e => setFormImg(e.target.value)} />
                            
                            <label className="text-xs text-kosame-browndark font-bold mb-1 block">หมายเหตุ</label>
                            <textarea className="w-full bg-kosame-bg border-2 border-kosame-cream p-3 mb-4 rounded-xl text-sm text-kosame-browndark focus:border-kosame-blue outline-none h-20 resize-none" value={formAdditional} onChange={e => setFormAdditional(e.target.value)}></textarea>

                            <div className="flex gap-3">
                                {editingId && (
                                    <button onClick={() => handleDelete(editingId)} className="p-3 bg-red-50 border-2 border-red-100 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-all flex items-center justify-center shadow-sm">
                                        <Icon name="trash-2" size={20}/>
                                    </button>
                                )}
                                <button onClick={handleSubmit} disabled={loading} className="flex-1 py-3 bg-kosame-yellow hover:bg-[#ebd453] text-white font-bold rounded-xl text-sm transition-all shadow-sm flex justify-center items-center gap-2">
                                    {loading ? <><Icon name="loader" className="animate-spin" size={16}/> กำลังบันทึก...</> : (editingId ? "บันทึกการแก้ไข" : "เพิ่มข้อมูล")}
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const App = () => {
      const [loading, setLoading] = useState(true);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [priceData, setPriceData] = useState([]);
      
      useEffect(() => { fetchData(); }, []);

      const fetchData = async () => {
        setLoading(true);
        try {
            const data = await server.getAllData();
            setPriceData(data.prices || []);
        } catch (e) { alert("ไม่สามารถดึงข้อมูลได้"); } 
        finally { setLoading(false); }
      };

      return (
        <div className="w-full max-w-md mx-auto relative pt-6 px-4">
          <SkyBackground />
          <div className="h-6 w-full striped-header-footer fixed top-0 left-0 z-20 shadow-sm"></div>

          <div className="relative z-10 w-full min-h-screen flex flex-col pt-4 pb-20">
            {loading && priceData.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-32 gap-4">
                    <div className="w-12 h-12 border-4 border-kosame-blue border-t-kosame-yellow rounded-full animate-spin"></div>
                    <div className="text-kosame-brown font-bold text-sm">กำลังโหลดข้อมูลราคา...</div>
                </div>
            ) : (
                <>
                    <div className="absolute top-0 right-0 z-50">
                        <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLoginModal(true)} className={`w-9 h-9 rounded-full flex items-center justify-center transition-all shadow-sm ${isAdmin ? 'bg-kosame-blue text-white' : 'bg-white text-kosame-brown border-2 border-kosame-cream hover:bg-kosame-cream'}`}>
                            <Icon name={isAdmin ? "unlock" : "lock"} size={16} />
                        </button>
                    </div>
                    <PriceView data={priceData} setData={setPriceData} isAdmin={isAdmin} categories={[...new Set(priceData.map(item => item.Category))].length > 0 ? [...new Set(priceData.map(item => item.Category))] : ['General']} />
                    {showLoginModal && <LoginModal onClose={() => setShowLoginModal(false)} onLogin={() => { setIsAdmin(true); setShowLoginModal(false); }} />}
                </>
            )}
            
            <footer className="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur-xl border-2 border-kosame-blue shadow-[0_4px_0_0_#cceaff] rounded-full px-8 py-2.5 flex items-center justify-center w-[85%] max-w-[320px] z-40">
                 <button onClick={() => window.location.href = 'index.html'} className={`flex items-center gap-2 transition-all text-kosame-brown hover:text-kosame-yellow font-bold`}>
                    <div className={`p-2 rounded-full transition-all bg-kosame-cream text-kosame-yellow`}><Icon name="arrow-left" size={20} /></div>
                    กลับหน้าหลัก
                 </button>
            </footer>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
